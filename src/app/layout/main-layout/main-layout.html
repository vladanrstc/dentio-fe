<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div>
        <strong>Dentio</strong>
        <span>Upravljanje ordinacijom</span>
      </div>
    </div>

    <nav aria-label="Glavna navigacija">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span>Pregled</span>
      </a>
      <a routerLink="/patients" routerLinkActive="active">
        <span>Pacijenti</span>
      </a>
      @if (canViewTeam) {
        <a routerLink="/team" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span>Tim</span>
        </a>
      }
      @if (canManageInvites) {
        <a routerLink="/team/invites" routerLinkActive="active">
          <span>Pozivnice</span>
        </a>
      }
      <a routerLink="/reports/settings" routerLinkActive="active">
        <span>Izveštaji</span>
      </a>
    </nav>
  </aside>

  <section class="main-area">
    <header class="topbar">
      <div>
        <strong>Radni panel</strong>
        <span>Dentio ordinacija</span>
      </div>

      <button type="button" (click)="logout()">Odjavi se</button>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
